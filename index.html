<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blokkenpuzzel</title>
    <link rel="stylesheet" href="styles.css?v=3">
  </head>
  <body>
    <main class="app" aria-labelledby="title">
      <section class="play-area">
        <header class="topbar">
          <div>
            <h1 id="title">Blokkenpuzzel <span id="level-label">Level 1</span></h1>
            <p id="level-description">Elk geplaatst blok wordt meteen vervangen.</p>
          </div>
          <button id="level-toggle" class="level-toggle" type="button" hidden>Level 2</button>
        </header>

        <div class="game-layout">
          <aside class="score-panel" aria-live="polite">
            <span id="target-row" class="target-row">Doelscore: <strong id="target-score">500</strong></span>
            <span>Score</span>
            <strong id="score">0</strong>
          </aside>

          <div class="board-wrap">
            <div id="board" class="board" aria-label="Speelbord van 10 bij 10"></div>
            <div id="score-float" class="score-float" aria-hidden="true"></div>
            <div id="goal-overlay" class="goal-overlay" hidden>
              <div id="goal-message" class="goal-message"></div>
              <button id="goal-new-game" type="button" hidden>Nieuw spel</button>
            </div>
          </div>

          <aside class="tray" aria-label="Beschikbare blokken">
            <h2>Kies een blok</h2>
            <div id="pieces" class="pieces"></div>
            <button id="new-game" type="button">Nieuw spel</button>
          </aside>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </section>

      <section id="game-over" class="game-over" hidden aria-live="polite">
        <div class="game-over-panel">
          <h2>Geen zetten meer mogelijk</h2>
          <p>Eindscore: <strong id="final-score">0</strong></p>
          <button id="restart-game" type="button">Nieuw spel</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=3"></script>
  </body>
</html>
